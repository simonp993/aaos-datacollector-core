build:
  maxIssues: 0

complexity:
  LongMethod:
    threshold: 60
  LongParameterList:
    functionThreshold: 8
    constructorThreshold: 10
  TooManyFunctions:
    thresholdInFiles: 30
    thresholdInClasses: 25

formatting:
  # Formatting rules that overlap with Spotless + ktlint are disabled here.
  # Spotless is the single source of truth for code formatting.
  # detekt style:MaxLineLength still enforces line length with @Suppress support.
  ImportOrdering:
    active: false
  Indentation:
    active: false
  MaximumLineLength:
    active: false
  ArgumentListWrapping:
    active: false
  ParameterListWrapping:
    active: false
  Wrapping:
    active: false
  TrailingCommaOnCallSite:
    active: true
  TrailingCommaOnDeclarationSite:
    active: true

naming:
  FunctionNaming:
    functionPattern: '[a-zA-Z][a-zA-Z0-9]*'
  TopLevelPropertyNaming:
    constantPattern: '[A-Z][A-Za-z0-9_]*'

style:
  MagicNumber:
    ignoreAnnotated:
      - 'Preview'
    ignorePropertyDeclaration: true
    ignoreCompanionObjectPropertyDeclaration: true
  ReturnCount:
    max: 4
  WildcardImport:
    active: true
    excludeImports:
      - 'kotlinx.coroutines.flow.*'

performance:
  SpreadOperator:
    active: false

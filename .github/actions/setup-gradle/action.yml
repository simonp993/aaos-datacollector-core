name: Setup Gradle
description: Shared setup for JDK 21 and Gradle with caching.

runs:
  using: composite
  steps:
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '21'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
